name: Machine Prep
description: Track setup tasks and required peripherals for a WoRC 2026 machine
title: "[Machine]: "
body:
  - type: textarea
    id: purpose
    attributes:
      label: Machine purpose
      description: What is this machine being brought for?
    validations:
      required: false

  - type: input
    id: CYD_Info
    attributes:
      label: Identify the CYD that goes with this machine
    validations:
      required: false

  - type: checkboxes
    id: prep_tasks
    attributes:
      label: Tasks to complete on this machine
      description: Things that need to be installed, configured, tested, updated, or verified.
      options:
        - label: OS Updates (Win98/etc)
        - label: Required software installed
        - label: Network configuration checked
        - label: Backups/exported configs completed
        - label: Machine boots cleanly

  - type: checkboxes
    id: required_accessories
    attributes:
      label: Required peripherals and accessories
      description: List only the items that belong with this machine and are required for it to function.
      options:
        - label: PC Power cable
        - label: Monitor
        - label: Monitor Power
        - label: VGA Cable
        - label: HDMI cable
        - label: Display Port Cable
        - label: Keyboard
        - label: Mouse
        - label: Network cable
        - label: Speakers

  - type: checkboxes
    id: packed_accessories
    attributes:
      label: Packed peripherals and accessories
      description: Check these off when packing the machines up
      options:
        - label: Power cable
        - label: Monitor
        - label: Monitor Power
        - label: VGA Cable
        - label: HDMI cable
        - label: Display Port Cable
        - label: Keyboard
        - label: Mouse
        - label: Network cable
        - label: Speakers
  
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Any extra machine-specific details, warnings, or dependencies.
      placeholder: "Anything important to remember."

  - type: checkboxes
    id: final_check
    attributes:
      label: Final confirmation
      options:
        - label: This machine is ready to bring to WoRC 2026
        - label: All required peripherals/accessories are gathered
